<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Projet_EVG_Terminal_Agent.exe</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            margin: 0;
            padding: 15px;
            min-height: 100dvh; /* S'adapte à la hauteur réelle */
            box-sizing: border-box;
            overflow-x: hidden;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        /* Scanline effect style Matrix */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #output { white-space: pre-wrap; line-height: 1.5; margin-bottom: 10px; }
        .line { margin: 5px 0; }
        .error { color: #ff3333; text-shadow: 0 0 5px rgba(255, 0, 0, 0.5); }
        .success { color: #00ffff; text-shadow: 0 0 5px rgba(0, 255, 255, 0.5); }

        #input-container { display: none; align-items: center; margin-top: 10px; position: relative; }
        #prompt { margin-right: 8px; font-weight: bold; }
        .cursor { display: inline-block; width: 10px; height: 1.2em; background-color: #00ff00; vertical-align: middle; animation: blink 1s step-end infinite; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

	/* --- Style pour les liens GPS --- */
        .gps-link {
            color: #00ff00;
            text-decoration: underline;
            text-decoration-style: dashed;
            position: relative;
            z-index: 20; /* Très important : permet de cliquer malgré le calque invisible */
            cursor: pointer;
        }
        .gps-link:hover {
            color: #fff;
        }

        /* Input invisible collé au curseur */
        #hidden-input {
            opacity: 0;
            width: 1px;
            height: 1px;
            border: none;
            outline: none;
            padding: 0;
            margin: 0;
            background: transparent;
            color: transparent;
            font-size: 16px; /* 16px empêche l'iPhone de zoomer tout seul */
        }

        #click-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: text;
        }
    </style>
</head>
<body>

    <div id="output"></div>
    <div id="input-container">
        <span id="prompt">C:\EVG\AGENT></span>
        <span id="cmd-text"></span><span class="cursor"></span>
        <input type="text" id="hidden-input" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="characters">
    </div>
    
    <div id="click-overlay"></div>

    <script>
        // --- SECURE HASH ALGORITHM ---
        function Advanced_SHA256_Cryptographic_Hash(str) {
            return str.replace(/[a-zA-Z]/g, function(c) {
                return String.fromCharCode((c <= 'Z' ? 90 : 122) >= (c = c.charCodeAt(0) + 13) ? c : c - 26);
            });
        }

        // Lexique
        const TARGETS = { 
            "0": "EBBG",       
            "2": "L",          
            "3": "L",          
            "4": "GNH",        
            "5": "XBBCN",      
            "6": "L",          
            "7": "QRYGN",      
            "8": "VAPRCGVBA",  
            "9": "L",          
            "10": "YNZOQN",     
            "11": "ZNYG",      
            "12": "L",         
            "13": "XVZ"        
        };

        const outputDiv = document.getElementById("output");
        const inputContainer = document.getElementById("input-container");
        const cmdText = document.getElementById("cmd-text");
        const hiddenInput = document.getElementById("hidden-input");
        const promptSpan = document.getElementById("prompt");
        
        // États de 0 à 14
        let state = parseInt(localStorage.getItem('evg_state')) || 0;
        let isTyping = false;
        let countdownInterval;

        // Force le focus clavier
        document.getElementById('click-overlay').addEventListener('click', () => { hiddenInput.focus(); });
        document.addEventListener('keydown', () => { hiddenInput.focus(); });

        // Synchronisation visuelle de la saisie
        hiddenInput.addEventListener('input', () => { cmdText.textContent = hiddenInput.value.toUpperCase(); });

        // Gérer l'affichage visuel AGENT vs ADMIN
        function setPromptAdmin(isAdmin) {
            promptSpan.innerText = isAdmin ? "C:\\EVG\\ADMIN> " : "C:\\EVG\\AGENT> ";
        }

        // Effet Machine à écrire
        // Effet Machine à écrire
        async function typeText(text, cssClass = "line") {
            isTyping = true;
            inputContainer.style.display = "none";
            const lineDiv = document.createElement('div');
            lineDiv.className = cssClass;
            outputDiv.appendChild(lineDiv);

            for (let i = 0; i < text.length; i++) {
                lineDiv.textContent += text.charAt(i);
                // Force agressivement l'écran à suivre cette ligne précise
                lineDiv.scrollIntoView(false); 
                await new Promise(r => setTimeout(r, 15)); 
            }
            isTyping = false;
        }

        async function printDirect(text, cssClass = "line") {
            const lineDiv = document.createElement('div');
            lineDiv.className = cssClass;
            lineDiv.textContent = text;
            outputDiv.appendChild(lineDiv);
            lineDiv.scrollIntoView(false);
        }

        async function printHTML(html, cssClass = "line") {
            const lineDiv = document.createElement('div');
            lineDiv.className = cssClass;
            lineDiv.innerHTML = html;
            outputDiv.appendChild(lineDiv);
            lineDiv.scrollIntoView(false);
        }

        async function printDirect(text, cssClass = "line") {
            const lineDiv = document.createElement('div');
            lineDiv.className = cssClass;
            lineDiv.textContent = text;
            outputDiv.appendChild(lineDiv);
            window.scrollTo(0, document.body.scrollHeight);
        }

        async function printHTML(html, cssClass = "line") {
            const lineDiv = document.createElement('div');
            lineDiv.className = cssClass;
            lineDiv.innerHTML = html;
            outputDiv.appendChild(lineDiv);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function requestInput() {
            inputContainer.style.display = "flex";
            hiddenInput.value = "";
            cmdText.textContent = "";
                        
            if (state > 0) {
                setTimeout(() => {
                    // Cible directement la ligne de texte au lieu du vide
                    inputContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 150);
            } else {
                window.scrollTo(0, 0); 
            }
        }

        window.addEventListener('resize', () => {
            if (state > 0 && inputContainer.style.display !== "none") {
                inputContainer.scrollIntoView({ block: 'nearest' });
            }
        });

        function saveState(newState) {
            state = newState;
            localStorage.setItem('evg_state', state);
        }

        // --- RESTAURATION DE L'HISTORIQUE ---
        async function restoreHistory() {
            if (state >= 2) {
                await printDirect("C:\\EVG\\AGENT> " + Advanced_SHA256_Cryptographic_Hash(TARGETS["0"]));
                await printDirect("> 🔓 Mission acceptée, chargement du programme en cours.", "success");
            }
            if (state >= 3) {
                await printDirect("> Ready ? Y/N");
                await printDirect("C:\\EVG\\AGENT> " + Advanced_SHA256_Cryptographic_Hash(TARGETS["2"]));
            }
            if (state >= 4) {
                await printDirect("> Mission 1 : Agent, l'asphalte t'attend. Alors monte dans les tours et fais leur mordre la poussière.");
                await printDirect("> Continuer ? Y/N");
                await printDirect("C:\\EVG\\AGENT> " + Advanced_SHA256_Cryptographic_Hash(TARGETS["3"]));
            }
            if (state >= 5) {
                await printDirect("> Veuillez demander à un Administrateur Système de saisir sa clé d'autorisation pour déchiffrer l'indice.");
                await printDirect("C:\\EVG\\ADMIN> " + Advanced_SHA256_Cryptographic_Hash(TARGETS["4"]));
            }
            if (state >= 6) {
                await printDirect("> Autorisation acceptée. Déchiffrement de l'indice...");
                await printDirect("> Indice : Gare aux carapaces sur la piste. Quel est le nom de l'espèce reptilienne ennemie du célèbre plombier moustachu ?");
                await printDirect("C:\\EVG\\AGENT> " + Advanced_SHA256_Cryptographic_Hash(TARGETS["5"]));
            }
            if (state >= 7) {
                await printDirect("> 🔓 Bravo ! Prochaine étape : ...Error 404, reality not found. Virtual intervention required.", "success");
                await printDirect("> Mission 2 : Pour survivre à la matrice vous devrez vous unir, ou être déconnectés à tout jamais.");
                await printDirect("> Continuer ? Y/N");
                await printDirect("C:\\EVG\\AGENT> " + Advanced_SHA256_Cryptographic_Hash(TARGETS["6"]));
            }
            if (state >= 8) {
                await printDirect("> Veuillez demander à un Administrateur Système de saisir sa clé d'autorisation pour déchiffrer l'indice.");
                await printDirect("C:\\EVG\\ADMIN> " + Advanced_SHA256_Cryptographic_Hash(TARGETS["7"]));
            }
            if (state >= 9) {
                await printDirect("> Autorisation acceptée. Déchiffrement de l'indice...");
                await printDirect("> Indice : Un rêve à l'intérieur d'un rêve. Quel est le nom de ce concept popularisé au cinéma avec une toupie ?");
                await printDirect("C:\\EVG\\AGENT> " + Advanced_SHA256_Cryptographic_Hash(TARGETS["8"]));
            }
            if (state >= 10) {
                await printDirect("> 🔓 Retour à la réalité, bien joué. Après l'effort, le réconfort.", "success");
                await printDirect("> Mission 3 : « Rien ne se perd, rien ne se crée, tout se transforme ». Attention, présence d'enzyme non identifiée.");
                await printDirect("> Continuer ? Y/N");
                await printDirect("C:\\EVG\\AGENT> " + Advanced_SHA256_Cryptographic_Hash(TARGETS["9"]));
            }
            if (state >= 11) {
                await printDirect("> Veuillez demander à un Administrateur Système de saisir sa clé d'autorisation pour déchiffrer l'indice.");
                await printDirect("C:\\EVG\\ADMIN> " + Advanced_SHA256_Cryptographic_Hash(TARGETS["10"]));
            }
            if (state >= 12) {
                await printDirect("> Autorisation acceptée. Déchiffrement de l'indice...");
                await printDirect("> Indice : Je suis l'âme de ce breuvage. Céréale germée puis séchée, je suis indispensable à la bière. Qui suis-je ?");
                await printDirect("C:\\EVG\\AGENT> " + Advanced_SHA256_Cryptographic_Hash(TARGETS["11"]));
            }
            if (state >= 13) {
                await printDirect("> 🔓 C'est un succès. La mission touche bientôt à sa fin.", "success");
                await printDirect("> 3 activités, 3 codes. La solution était sous tes yeux depuis le début.");
                await printDirect("> Continuer ? Y/N");
                await printDirect("C:\\EVG\\AGENT> " + Advanced_SHA256_Cryptographic_Hash(TARGETS["12"]));
            }
            if (state >= 14) {
                await printDirect("> Accès Système autorisé. Veuillez saisir la clé de validation. (3) essais restants.");
                await printDirect("C:\\EVG\\AGENT> " + Advanced_SHA256_Cryptographic_Hash(TARGETS["13"]));
            }
            
            // On met à jour l'invite de commande selon l'état restauré
            setPromptAdmin([4, 7, 10].includes(state));
        }

        // --- MOTEUR LOGIQUE DES ÉTAPES ---
        async function runLogic(input = null) {

	    if (input === "RESET") {
                localStorage.clear(); // Efface la mémoire
                location.reload();    // Recharge la page instantanément
                return;               // Stoppe le reste du code
            }

            if (input !== null) {
                const isAdminExpected = [4, 7, 10].includes(state);
                const prefix = isAdminExpected ? "C:\\EVG\\ADMIN> " : "C:\\EVG\\AGENT> ";
                
                // 1. On cache la zone de saisie clignotante
                inputContainer.style.display = "none";
                
                // 2. On écrit la ligne en dur immédiatement (zéro clignotement)
                await printDirect(prefix + input);
                
                // 3. Pause dramatique de 1 seconde (1000 millisecondes) avant la réponse
                await new Promise(r => setTimeout(r, 1000));
            }

            const hashedInput = input ? Advanced_SHA256_Cryptographic_Hash(input) : null;
            
            switch (state) {
                case 0:
                    const targetDate = new Date("2026-03-21T10:00:00").getTime();
                    if (!countdownInterval) {
                        const cdDiv = document.createElement('div');
                        cdDiv.style.marginBottom = "20px";
                        outputDiv.appendChild(cdDiv);
                        
                        function updateCountdown() {
                            const now = new Date().getTime();
                            const distance = targetDate - now;
                            const linkMap1 = `<a href="https://www.google.com/maps/search/?api=1&query=45°42'32.2%22N+4°51'10.6%22E" target="_blank" class="gps-link">45°42'32.2"N 4°51'10.6"E</a>`;
                            
                            if (distance < 0) {
                                // Quand le temps est écoulé
                                clearInterval(countdownInterval);
                                cdDiv.innerHTML = `> SYSTÈME DÉVERROUILLÉ.<br>> Rends-toi au point de rendez-vous à 09h45 (UTC+1) : ${linkMap1}<br>> Une fois sur place, demande le mot de passe aux administrateurs pour commencer le briefing.`;
                                requestInput(); // Affiche l'invite de commande C:\EVG\AGENT>
                            } else {
                                // Tant que le compteur tourne
                                const d = Math.floor(distance / (1000 * 60 * 60 * 24));
                                const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                                const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                                const s = Math.floor((distance % (1000 * 60)) / 1000);
                                cdDiv.innerHTML = `> SYSTÈME VERROUILLÉ.<br>> DEPLOIEMENT DANS : ${d}j ${h}h ${m}m ${s}s<br><br> Rends-toi au point de rendez-vous à 09h45 (UTC+1) : ${linkMap1}<br> Une fois sur place, demande le mot de passe aux administrateurs pour commencer le briefing.`;
                            }
                        }
                        updateCountdown();
                        countdownInterval = setInterval(updateCountdown, 1000);
                        requestInput();
                    }

                    if (hashedInput === TARGETS["0"]) {
                        clearInterval(countdownInterval);
                        outputDiv.innerHTML = "";
                        await typeText("> 🔓 Mission acceptée, chargement du programme en cours.", "success");
                        saveState(2);
                        setTimeout(() => runLogic(), 1000);
                    } else if (input !== null) {
                        await printDirect("> ACCÈS REFUSÉ.", "error");
                        requestInput();
                    }
                    break;

                case 2:
                    if (input === null) {
                        await typeText("> Ready ? Y/N");
                        requestInput();
                    } else if (hashedInput === TARGETS["2"]) { saveState(3); runLogic(); }
                    else { requestInput(); }
                    break;

                case 3:
                    if (input === null) {
                        await typeText("> Mission 1 : Agent, l'asphalte t'attend. Alors monte dans les tours et fais leur mordre la poussière.");
                        await typeText("> Continuer ? Y/N");
                        requestInput();
                    } else if (hashedInput === TARGETS["3"]) { saveState(4); runLogic(); }
                    else { requestInput(); }
                    break;

                case 4:
                    if (input === null) {
                        await typeText("> Veuillez demander à un Administrateur Système de saisir sa clé d'autorisation pour déchiffrer l'indice.");
                        setPromptAdmin(true);
                        requestInput();
                    } else if (hashedInput === TARGETS["4"]) { 
                        setPromptAdmin(false); 
                        saveState(5); 
                        runLogic(); 
                    } else { await printDirect("> ACCÈS REFUSÉ.", "error"); requestInput(); }
                    break;

                case 5:
                    if (input === null) {
                        await typeText("> Autorisation acceptée. Déchiffrement de l'indice...");
                        await typeText("> Indice : Gare aux carapaces sur la piste. Quel est le nom de l'espèce reptilienne ennemie du célèbre plombier moustachu ?");
                        requestInput();
                    } else if (hashedInput === TARGETS["5"]) { saveState(6); runLogic(); }
                    else { await printDirect("> CODE ERRONÉ.", "error"); requestInput(); }
                    break;

                case 6:
                    if (input === null) {
                        await typeText("> 🔓 Bravo ! Prochaine étape : ...Error 404, reality not found. Virtual intervention required.", "success");
                        await typeText("> Mission 2 : Pour survivre à la matrice vous devrez vous unir, ou être déconnectés à tout jamais.");
                        await typeText("> Continuer ? Y/N");
                        requestInput();
                    } else if (hashedInput === TARGETS["6"]) { saveState(7); runLogic(); }
                    else { requestInput(); }
                    break;

                case 7:
                    if (input === null) {
                        await typeText("> Veuillez demander à un Administrateur Système de saisir sa clé d'autorisation pour déchiffrer l'indice.");
                        setPromptAdmin(true);
                        requestInput();
                    } else if (hashedInput === TARGETS["7"]) { 
                        setPromptAdmin(false); 
                        saveState(8); 
                        runLogic(); 
                    } else { await printDirect("> ACCÈS REFUSÉ.", "error"); requestInput(); }
                    break;

                case 8:
                    if (input === null) {
                        await typeText("> Autorisation acceptée. Déchiffrement de l'indice...");
                        await typeText("> Indice : Un rêve à l'intérieur d'un rêve. Quel est le nom de ce concept popularisé au cinéma avec une toupie ?");
                        requestInput();
                    } else if (hashedInput === TARGETS["8"]) { saveState(9); runLogic(); }
                    else { await printDirect("> CODE ERRONÉ.", "error"); requestInput(); }
                    break;

                case 9:
                    if (input === null) {
                        await typeText("> 🔓 Retour à la réalité, bien joué. Après l'effort, le réconfort.", "success");
                        await typeText("> Mission 3 : « Rien ne se perd, rien ne se crée, tout se transforme ». Attention, présence d'enzyme non identifiée.");
                        await typeText("> Continuer ? Y/N");
                        requestInput();
                    } else if (hashedInput === TARGETS["9"]) { saveState(10); runLogic(); }
                    else { requestInput(); }
                    break;

                case 10:
                    if (input === null) {
                        await typeText("> Veuillez demander à un Administrateur Système de saisir sa clé d'autorisation pour déchiffrer l'indice.");
                        setPromptAdmin(true);
                        requestInput();
                    } else if (hashedInput === TARGETS["10"]) { 
                        setPromptAdmin(false); 
                        saveState(11); 
                        runLogic(); 
                    } else { await printDirect("> ACCÈS REFUSÉ.", "error"); requestInput(); }
                    break;

                case 11:
                    if (input === null) {
                        await typeText("> Autorisation acceptée. Déchiffrement de l'indice...");
                        await typeText("> Indice : Je suis l'âme de ce breuvage. Céréale germée puis séchée, je suis indispensable à la bière. Qui suis-je ?");
                        requestInput();
                    } else if (hashedInput === TARGETS["11"]) { saveState(12); runLogic(); }
                    else { await printDirect("> CODE ERRONÉ.", "error"); requestInput(); }
                    break;

                case 12:
                    if (input === null) {
                        await typeText("> 🔓 C'est un succès. La mission touche bientôt à sa fin.", "success");
                        await typeText("> 3 activités, 3 codes. La solution était sous tes yeux depuis le début.");
                        await typeText("> Continuer ? Y/N");
                        requestInput();
                    } else if (hashedInput === TARGETS["12"]) { saveState(13); runLogic(); }
                    else { requestInput(); }
                    break;

                case 13:
                    if (input === null) {
                        await typeText("> Accès Système autorisé. Veuillez saisir la clé de validation. (3) essais restants.");
                        requestInput();
                    } else if (hashedInput === TARGETS["13"]) { 
                        saveState(14); 
                        runLogic(); 
                    } else {
                        let fails = parseInt(localStorage.getItem('evg_fails')) || 0;
                        fails++;
                        localStorage.setItem('evg_fails', fails);
                        
                        if (fails === 1) {
                            await printDirect("> CLÉ INCORRECTE. ANALYSEZ L'HISTORIQUE. (2) essais restants.", "error");
                        } else if (fails === 2) {
                            await printDirect("> CLÉ INCORRECTE. ANALYSEZ L'HISTORIQUE. (1) essai restant. Chargement de l'indice...", "error");
                        } else {
                            await printDirect("> Indice : Concatène la première lettre de chaque code validé aujourd'hui. Quelle est la clé de ton avenir ?", "error");
                        }
                        requestInput();
                    }
                    break;

                case 14:
                    if (input === null) {
                        const linkMap2 = `<a href="https://www.google.com/maps/search/?api=1&query=45°46'14.6%22N+4°50'10.6%22E" target="_blank" class="gps-link">45°46'14.6"N 4°50'10.6"E</a>`;
                        await typeText("> 🎉 FÉLICITATIONS ! Mission accomplie.", "success");
                        await printHTML(`> Point de rendez-vous final (20h15) : ${linkMap2}`, "success");
                        await typeText("> D'ici là, profite d'une pause méritée, Agent.", "success");
                        await typeText("> Fin de transmission.", "success");
                    }
                    break;
            }
        }

        // Ecoute de la touche Entrée
        hiddenInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !isTyping && hiddenInput.value.trim() !== "") {
                const val = hiddenInput.value.trim().toUpperCase();
                
                // Force le clavier à disparaître sur mobile
                hiddenInput.blur(); 
                
                // On lance directement la logique (qui gère maintenant la pause)
                runLogic(val);
            }
        });

        // Démarrage initial avec restauration d'historique
        (async function init() {
            if (state > 0) {
                await restoreHistory();
            }
            runLogic();
        })();

    </script>
</body>
</html>
